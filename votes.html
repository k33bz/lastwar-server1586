<!DOCTYPE html>
<html lang="en">
<!--
    Server 1586 - Council Votes
    Public display of council voting records

    Version: 1.0.0
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Council Votes - Server 1586</title>

    <!-- Cache Control Headers -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="stylesheet" href="css/styles.css?v=2.0.0">

    <style>
        .votes-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-header p {
            color: #6c757d;
            font-size: 1.1rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .votes-grid {
            display: grid;
            gap: 2rem;
        }

        .vote-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .vote-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .vote-date {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .vote-resolution {
            margin: 1.5rem 0;
            padding: 1.5rem;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            line-height: 1.6;
        }

        .vote-resolution strong {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .vote-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .vote-result-group {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
        }

        .vote-result-group h4 {
            margin: 0 0 1rem 0;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #495057;
        }

        .vote-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .vote-tag {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .vote-tag.yes {
            background: #d4edda;
            color: #155724;
        }

        .vote-tag.no {
            background: #f8d7da;
            color: #721c24;
        }

        .vote-tag.abstain {
            background: #fff3cd;
            color: #856404;
        }

        .vote-tag.absent {
            background: #e9ecef;
            color: #6c757d;
        }

        .vote-summary {
            display: flex;
            justify-content: space-around;
            padding: 1.5rem;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 8px;
            margin: 1.5rem 0;
        }

        .vote-summary-item {
            text-align: center;
        }

        .vote-summary-item .count {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }

        .vote-summary-item .label {
            font-size: 0.875rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .screenshots-section {
            margin-top: 2rem;
        }

        .screenshots-section h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .screenshot-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .screenshot-item:hover {
            transform: scale(1.05);
        }

        .screenshot-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .no-votes {
            text-align: center;
            padding: 4rem 2rem;
            color: #6c757d;
        }

        .no-votes svg {
            width: 100px;
            height: 100px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: #667eea;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Image Preview Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .votes-container {
                padding: 1rem;
            }

            .page-header h1 {
                font-size: 2rem;
            }

            .vote-card {
                padding: 1.5rem;
            }

            .vote-results {
                grid-template-columns: 1fr;
            }

            .vote-summary {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="votes-container">
        <a href="index.html" class="back-link">← Back to Home</a>

        <div class="page-header">
            <h1>🗳️ Council Votes</h1>
            <p>Transparent record of all council voting sessions</p>
        </div>

        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading votes...</p>
        </div>

        <div id="votesContainer" class="votes-grid" style="display: none;"></div>

        <div id="noVotes" class="no-votes" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 11L12 14L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M21 12V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h2>No Votes Yet</h2>
            <p>Council voting records will appear here when available.</p>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="imageModal" class="modal" onclick="closeImageModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="" alt="Screenshot preview">
    </div>

    <script>
        let votes = [];

        async function loadVotes() {
            const loading = document.getElementById('loading');
            const container = document.getElementById('votesContainer');
            const noVotes = document.getElementById('noVotes');

            loading.style.display = 'block';
            container.style.display = 'none';
            noVotes.style.display = 'none';

            try {
                const response = await fetch('admin/votes_api.php?action=list');
                const data = await response.json();

                if (data.success && data.votes && data.votes.length > 0) {
                    votes = data.votes;
                    renderVotes();
                    container.style.display = 'grid';
                } else {
                    noVotes.style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading votes:', error);
                noVotes.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }

        function renderVotes() {
            const container = document.getElementById('votesContainer');
            container.innerHTML = '';

            votes.forEach(vote => {
                const card = document.createElement('div');
                card.className = 'vote-card';

                // Count votes
                const yesVotes = [];
                const noVotes = [];
                const abstainVotes = [];
                const absentVotes = [];

                for (const [tag, voteChoice] of Object.entries(vote.votes || {})) {
                    if (voteChoice === 'yes') yesVotes.push(tag);
                    else if (voteChoice === 'no') noVotes.push(tag);
                    else if (voteChoice === 'abstain') abstainVotes.push(tag);
                    else if (voteChoice === 'absent') absentVotes.push(tag);
                }

                // Build vote results HTML
                let resultsHtml = '';
                if (yesVotes.length > 0) {
                    resultsHtml += `
                        <div class="vote-result-group">
                            <h4>✅ Yes (${yesVotes.length})</h4>
                            <div class="vote-tags">
                                ${yesVotes.map(tag => `<span class="vote-tag yes">${tag}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
                if (noVotes.length > 0) {
                    resultsHtml += `
                        <div class="vote-result-group">
                            <h4>❌ No (${noVotes.length})</h4>
                            <div class="vote-tags">
                                ${noVotes.map(tag => `<span class="vote-tag no">${tag}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
                if (abstainVotes.length > 0) {
                    resultsHtml += `
                        <div class="vote-result-group">
                            <h4>🤐 Abstain (${abstainVotes.length})</h4>
                            <div class="vote-tags">
                                ${abstainVotes.map(tag => `<span class="vote-tag abstain">${tag}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }
                if (absentVotes.length > 0) {
                    resultsHtml += `
                        <div class="vote-result-group">
                            <h4>⚪ Absent (${absentVotes.length})</h4>
                            <div class="vote-tags">
                                ${absentVotes.map(tag => `<span class="vote-tag absent">${tag}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }

                // Screenshots section
                let screenshotsHtml = '';
                if (vote.screenshots && vote.screenshots.length > 0) {
                    screenshotsHtml = `
                        <div class="screenshots-section">
                            <h3>📸 Supporting Documentation</h3>
                            <div class="screenshots-grid">
                                ${vote.screenshots.map(screenshot => `
                                    <div class="screenshot-item" onclick="openImageModal('${screenshot}')">
                                        <img src="${screenshot}" alt="Vote screenshot">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="vote-date">📅 ${formatDate(vote.vote_date)}</div>

                    <div class="vote-resolution">
                        <strong>Resolution:</strong>
                        ${escapeHtml(vote.resolution)}
                    </div>

                    <div class="vote-summary">
                        <div class="vote-summary-item">
                            <span class="count" style="color: #28a745;">${yesVotes.length}</span>
                            <span class="label">Yes</span>
                        </div>
                        <div class="vote-summary-item">
                            <span class="count" style="color: #dc3545;">${noVotes.length}</span>
                            <span class="label">No</span>
                        </div>
                        <div class="vote-summary-item">
                            <span class="count" style="color: #ffc107;">${abstainVotes.length}</span>
                            <span class="label">Abstain</span>
                        </div>
                        <div class="vote-summary-item">
                            <span class="count" style="color: #6c757d;">${absentVotes.length}</span>
                            <span class="label">Absent</span>
                        </div>
                    </div>

                    <div class="vote-results">
                        ${resultsHtml}
                    </div>

                    ${screenshotsHtml}
                `;

                container.appendChild(card);
            });
        }

        function openImageModal(imageSrc) {
            document.getElementById('modalImage').src = imageSrc;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeImageModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        // Load votes on page load
        document.addEventListener('DOMContentLoaded', loadVotes);
    </script>
</body>
</html>
