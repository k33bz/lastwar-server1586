name: Deploy to Production

on:
  push:
    branches: [mainline]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  test:
    name: Run Tests & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python scripts/run-tests.py
        continue-on-error: false

      - name: Validate JSON files
        run: |
          echo "Validating version.json..."
          python -m json.tool version.json > /dev/null
          echo "version.json is valid"

          echo "Validating alliances.json..."
          python -m json.tool data/alliances.json > /dev/null
          echo "alliances.json is valid"

          echo "Validating rules.json..."
          python -m json.tool data/rules.json > /dev/null
          echo "rules.json is valid"

          echo "Validating amendments.json..."
          python -m json.tool data/amendments.json > /dev/null
          echo "amendments.json is valid"

          echo "Validating rotation-schedule.json..."
          python -m json.tool data/rotation-schedule.json > /dev/null
          echo "rotation-schedule.json is valid"

          echo "Validating server-info.json..."
          python -m json.tool data/server-info.json > /dev/null
          echo "server-info.json is valid"

          echo "Validating signature-history.json..."
          python -m json.tool data/signature-history.json > /dev/null
          echo "signature-history.json is valid"

      - name: Validate CSV files
        run: python scripts/validate-csv.py

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: curl, json

      - name: Install Composer dependencies
        run: |
          cd admin
          composer install --no-dev --optimize-autoloader

      - name: Start PHP development server
        run: |
          php -S localhost:8080 > /dev/null 2>&1 &
          echo $! > php-server.pid
          sleep 3
        working-directory: ${{ github.workspace }}

      - name: Run PHP unit tests
        run: php RoleBasedTest.php
        working-directory: admin/tests

      - name: Stop PHP development server
        if: always()
        run: |
          if [ -f php-server.pid ]; then
            kill $(cat php-server.pid) || true
            rm php-server.pid
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-test-results
          path: admin/tests/test-results.json
          if-no-files-found: warn

      - name: Test summary
        if: success()
        run: |
          echo "All tests passed!"
          echo "All JSON files validated"
          echo "CSV files validated"
          echo "PHP unit tests passed"
          echo "Ready for deployment"

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/mainline'

    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create production .env file
        run: |
          cat > admin/.env << 'EOF'
          # JWT Secret Key
          SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}

          # SMTP Configuration - cPanel Email
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME="${{ secrets.SMTP_FROM_NAME }}"

          # Application Configuration
          APP_URL=${{ secrets.APP_URL }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}

          # Token Expiry (in seconds)
          MAGIC_LINK_EXPIRY=600        # 10 minutes
          SESSION_TOKEN_EXPIRY=3600    # 1 hour

          # JWT Secret Key Rotation Configuration
          AUTO_KEY_ROTATION_ENABLED=true     # Enabled - automatic rotation every 90 days
          KEY_ROTATION_INTERVAL_DAYS=90      # Rotate keys every 90 days
          KEY_ROTATION_GRACE_PERIOD=300      # 5 minutes grace period for seamless rotation

          # Environment
          APP_ENV=production
          EOF

      - name: Restore deployment state cache
        uses: actions/cache@v3
        with:
          path: .deploy-state.json
          key: ftp-deploy-state-${{ github.sha }}
          restore-keys: |
            ftp-deploy-state-

      - name: Deploy via FTP (Incremental)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          APP_URL: ${{ secrets.APP_URL }}
        run: python scripts/deploy-ftp-incremental.py

      - name: Save deployment state cache
        if: success()
        uses: actions/cache/save@v3
        with:
          path: .deploy-state.json
          key: ftp-deploy-state-${{ github.sha }}

      - name: Verify deployment
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          echo "Verifying deployment..."

          # Wait for FTP sync to complete
          echo "Waiting 10 seconds for FTP sync..."
          sleep 10

          # Verify version.json is accessible
          echo "Checking version.json accessibility..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" ${APP_URL}/version.json)

          if [ "$RESPONSE" = "200" ]; then
            echo "version.json is accessible (HTTP $RESPONSE)"

            # Fetch and display version
            VERSION_DATA=$(curl -s ${APP_URL}/version.json)
            VERSION=$(echo $VERSION_DATA | python -c "import json, sys; print(json.load(sys.stdin)['version'])")
            echo "Deployed version: $VERSION"

            # Verify it matches local version
            LOCAL_VERSION=$(python -c "import json; print(json.load(open('version.json'))['version'])")
            if [ "$VERSION" = "$LOCAL_VERSION" ]; then
              echo "Version match confirmed!"
            else
              echo "Warning: Version mismatch! Local: $LOCAL_VERSION, Remote: $VERSION"
              exit 1
            fi
          else
            echo "Error: version.json returned HTTP $RESPONSE"
            echo "Deployment verification failed!"
            exit 1
          fi

          echo "Deployment verification successful!"

      - name: Install Composer dependencies via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Install SSH client
          sudo apt-get update
          sudo apt-get install -y openssh-client

          # Create SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Add private key
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Add host to known_hosts to avoid prompt
          ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Test SSH connection
          echo "Testing SSH connection to $SSH_USER@$SSH_HOST:$SSH_PORT..."
          ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT -o StrictHostKeyChecking=accept-new $SSH_USER@$SSH_HOST "echo 'SSH connection successful!'"

          # Run composer install
          echo "Running composer install in admin directory..."
          ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT $SSH_USER@$SSH_HOST "cd ~/${DEPLOY_PATH}/admin && composer install --no-dev --optimize-autoloader"

          # Verify vendor directory exists
          echo "Verifying vendor directory..."
          ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT $SSH_USER@$SSH_HOST "ls -la ~/${DEPLOY_PATH}/admin/vendor/autoload.php"

          echo "Composer dependencies installed successfully!"

      - name: Check version for key rotation
        id: check_version
        run: |
          # Get current version from version.json
          CURRENT_VERSION=$(python -c "import json; print(json.load(open('version.json'))['version'])")
          echo "Current version: $CURRENT_VERSION"

          # Get previous version from git history
          git fetch origin mainline --depth=2
          PREV_VERSION=$(git show HEAD~1:version.json 2>/dev/null | python -c "import json, sys; print(json.load(sys.stdin)['version'])" || echo "0.0.0")
          echo "Previous version: $PREV_VERSION"

          # Extract major.minor from versions
          CURRENT_MINOR=$(echo $CURRENT_VERSION | cut -d. -f1,2)
          PREV_MINOR=$(echo $PREV_VERSION | cut -d. -f1,2)

          echo "Current major.minor: $CURRENT_MINOR"
          echo "Previous major.minor: $PREV_MINOR"

          # Check if minor version changed
          SHOULD_ROTATE="false"
          if [ "$CURRENT_MINOR" != "$PREV_MINOR" ]; then
            echo "Minor version changed! Key rotation will be triggered."
            SHOULD_ROTATE="true"
          else
            echo "Minor version unchanged. No automatic rotation."
          fi

          # Also check commit message for manual triggers (using environment variable to avoid quote issues)
          if echo "$COMMIT_MESSAGE" | grep -qE '\[rotate-keys\]|\[major\]|BREAKING.CHANGE'; then
            echo "Manual key rotation requested in commit message"
            SHOULD_ROTATE="true"
          fi

          echo "should_rotate=$SHOULD_ROTATE" >> $GITHUB_OUTPUT
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

      - name: Rotate JWT keys (if needed)
        if: steps.check_version.outputs.should_rotate == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "Running key rotation on production..."

          # Run key rotation script via SSH
          ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT $SSH_USER@$SSH_HOST "cd ~/${DEPLOY_PATH}/admin && php rotate_keys_cli.php"

          echo "Key rotation completed!"
          echo "All users will need to log in again for security."

      - name: Deployment summary
        if: success()
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          echo "Deployment successful!"
          echo "Website: ${APP_URL}"
          echo "Admin Dashboard: ${APP_URL}/admin/dashboard.php"
          echo "Deployed from commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Composer dependencies installed via SSH"

      - name: Deployment failed
        if: failure()
        run: |
          echo "Deployment failed!"
          echo "Check logs above for details"
          exit 1
