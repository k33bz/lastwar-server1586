name: Deploy to Production

on:
  push:
    branches: [mainline]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  test:
    name: Run Tests & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run unit tests
        run: python scripts/run-tests.py
        continue-on-error: false

      - name: Validate JSON files
        run: |
          echo "Validating alliances.json..."
          python -m json.tool data/alliances.json > /dev/null
          echo "✓ alliances.json is valid"

          echo "Validating rules.json..."
          python -m json.tool data/rules.json > /dev/null
          echo "✓ rules.json is valid"

          echo "Validating amendments.json..."
          python -m json.tool data/amendments.json > /dev/null
          echo "✓ amendments.json is valid"

          echo "Validating rotation-schedule.json..."
          python -m json.tool data/rotation-schedule.json > /dev/null
          echo "✓ rotation-schedule.json is valid"

          echo "Validating server-info.json..."
          python -m json.tool data/server-info.json > /dev/null
          echo "✓ server-info.json is valid"

          echo "Validating signature-history.json..."
          python -m json.tool data/signature-history.json > /dev/null
          echo "✓ signature-history.json is valid"

      - name: Validate CSV files
        run: python scripts/validate-csv.py

      - name: Test summary
        if: success()
        run: |
          echo "✅ All tests passed!"
          echo "✅ All JSON files validated"
          echo "✅ CSV files validated"
          echo "Ready for deployment"

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/mainline'

    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create production .env file
        run: |
          cat > admin/.env << 'EOF'
          # JWT Secret Key
          SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}

          # SMTP Configuration - cPanel Email
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME="${{ secrets.SMTP_FROM_NAME }}"

          # Application Configuration
          APP_URL=${{ secrets.APP_URL }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}

          # Token Expiry (in seconds)
          MAGIC_LINK_EXPIRY=600        # 10 minutes
          SESSION_TOKEN_EXPIRY=3600    # 1 hour

          # Environment
          APP_ENV=production
          EOF

      - name: Restore deployment state cache
        uses: actions/cache@v3
        with:
          path: .deploy-state.json
          key: ftp-deploy-state-${{ github.sha }}
          restore-keys: |
            ftp-deploy-state-

      - name: Deploy via FTP (Incremental)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          APP_URL: ${{ secrets.APP_URL }}
        run: python scripts/deploy-ftp-incremental.py

      - name: Save deployment state cache
        if: success()
        uses: actions/cache/save@v3
        with:
          path: .deploy-state.json
          key: ftp-deploy-state-${{ github.sha }}

      - name: Install Composer dependencies via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Install SSH client
          sudo apt-get update
          sudo apt-get install -y openssh-client

          # Create SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Add private key
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Add host to known_hosts to avoid prompt
          ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Test SSH connection
          echo "Testing SSH connection to $SSH_USER@$SSH_HOST:$SSH_PORT..."
          ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT -o StrictHostKeyChecking=accept-new $SSH_USER@$SSH_HOST "echo 'SSH connection successful!'"

          # Run composer install
          echo "Running composer install in admin directory..."
          ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT $SSH_USER@$SSH_HOST "cd ~/${DEPLOY_PATH}/admin && composer install --no-dev --optimize-autoloader"

          # Verify vendor directory exists
          echo "Verifying vendor directory..."
          ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT $SSH_USER@$SSH_HOST "ls -la ~/${DEPLOY_PATH}/admin/vendor/autoload.php"

          echo "✅ Composer dependencies installed successfully!"

      - name: Rotate JWT keys (if major change)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Check if commit message contains [rotate-keys] or [major]
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if [[ "$COMMIT_MSG" =~ \[rotate-keys\] ]] || [[ "$COMMIT_MSG" =~ \[major\] ]] || [[ "$COMMIT_MSG" =~ BREAKING.CHANGE ]]; then
            echo "🔄 Key rotation requested in commit message"
            echo "Running key rotation on production..."

            # Run key rotation script via SSH
            ssh -i ~/.ssh/id_ed25519 -p $SSH_PORT $SSH_USER@$SSH_HOST "cd ~/${DEPLOY_PATH}/admin && php rotate_keys_cli.php"

            echo "✅ Key rotation completed!"
          else
            echo "ℹ️  No key rotation requested"
            echo "   To rotate keys, include one of these in commit message:"
            echo "   - [rotate-keys]"
            echo "   - [major]"
            echo "   - BREAKING CHANGE:"
          fi

      - name: Deployment summary
        if: success()
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Website: ${APP_URL}"
          echo "🔧 Admin Dashboard: ${APP_URL}/admin/dashboard.php"
          echo "📦 Deployed from commit: ${{ github.sha }}"
          echo "👤 Deployed by: ${{ github.actor }}"
          echo "✅ Composer dependencies installed via SSH"

      - name: Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs above for details"
          exit 1
